# Apache Virtual Host Configuration for The Shelter Squaremap
# File: /etc/apache2/sites-available/theshelter.conf
#
# IMPORTANT: This VirtualHost serves BOTH the React landing page AND the
# squaremap alias under the SAME origin (same hostname + same port). That is
# what allows the in-page "View Live Map" iframe to load the map regardless
# of which port (80, 8080, 9090, ...) Apache is listening on.
#
# Because the ISP blocks ports 80 and 443, we listen on 8080. If you ever
# change the port, change BOTH the `Listen` directive in /etc/apache2/ports.conf
# AND the `<VirtualHost *:PORT>` line below to match.
#
# Make sure /etc/apache2/ports.conf contains:
#     Listen 8080
# (in addition to or instead of "Listen 80")
#
# WORKFLOW NOTE:
# The site is served DIRECTLY out of the React build folder, so a new `yarn build`
# instantly goes live with no copy step. DocumentRoot points at the build folder.
# After a build, just refresh the browser - no Apache reload needed for content
# changes (only for config changes to this file).

<VirtualHost *:8080>
    ServerName thesheltercommunity.servegame.com
    ServerAdmin admin@thesheltercommunity.servegame.com

    # Document root points DIRECTLY at the React build folder so new builds
    # are instantly live. Adjust the path here if your build folder lives
    # elsewhere on the server.
    DocumentRoot /var/www/theshelter/frontend/build

    <Directory /var/www/theshelter/frontend/build>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # React Router support (SPA fallback to index.html)
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        # Do not rewrite requests destined for the squaremap alias
        RewriteCond %{REQUEST_URI} !^/sheltermcmap
        RewriteRule . /index.html [L]
    </Directory>

    # Squaremap location - served from the SAME origin as the landing page
    # so the React iframe can load it with a relative URL: /sheltermcmap/
    Alias /sheltermcmap /home/shelterowner/minecraft/paper/plugins/squaremap/web

    <Directory /home/shelterowner/minecraft/paper/plugins/squaremap/web>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted

        # Enable CORS for map tiles (useful if you ever embed cross-origin)
        Header set Access-Control-Allow-Origin "*"

        # DirectoryIndex
        DirectoryIndex index.html
    </Directory>

    # Cache settings for map tiles
    <Location /sheltermcmap/tiles>
        Header set Cache-Control "max-age=3600, public"
    </Location>

    <Location /sheltermcmap/images>
        Header set Cache-Control "max-age=3600, public"
    </Location>

    # Allow the React app at "/" to embed the squaremap in an iframe.
    # (Squaremap itself doesn't set X-Frame-Options, but this is defensive.)
    <Location /sheltermcmap>
        Header always unset X-Frame-Options
        Header set Content-Security-Policy "frame-ancestors 'self'"
    </Location>

    # Disable aggressive caching of the React app's HTML so a fresh `yarn build`
    # is picked up immediately by returning visitors. Hashed JS/CSS bundles
    # (e.g. main.abc123.js) keep long cache times since their filenames change
    # on every build.
    <FilesMatch "\.(html)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </FilesMatch>

    <FilesMatch "\.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/theshelter-error.log
    CustomLog ${APACHE_LOG_DIR}/theshelter-access.log combined
</VirtualHost>

# vim: syntax=apache ts=4 sw=4 sts=4 sr noet
